{% extends 'base.html' %}

{% block title %}Удаление категории{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card-modern text-center py-5">
                <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
                <h3 class="mb-3">Удаление категории</h3>
                <p class="text-muted mb-4">
                    Вы уверены, что хотите удалить категорию "{{ object.name }}"?
                </p>
                
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn-gradient bg-danger border-0">
                        <i class="fas fa-trash me-2"></i>Удалить
                    </button>
                    <a href="{% url 'category_list' %}" class="btn-outline-gradient ms-2">
                        <i class="fas fa-times me-2"></i>Отмена
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
