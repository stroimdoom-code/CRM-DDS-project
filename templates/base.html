<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ДДС Учет{% endblock %}</title>
    
    <!-- Bootstrap 5 + Icons + Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    {% load static %}
    <link rel="stylesheet" href="{% static 'dds/css/style.css' %}">
</head>
<body>
    <!-- Современная навигация с градиентом -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'cashflow_list' %}">
                <i class="fas fa-chart-line me-2"></i>
                <span>ДДС Учет</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'cashflow_list' %}active{% endif %}" 
                           href="{% url 'cashflow_list' %}">
                            <i class="fas fa-table me-1"></i>Операции
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'directories' %}active{% endif %}" 
                           href="{% url 'directories' %}">
                            <i class="fas fa-book me-1"></i>Справочники
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <main>
        <!-- Блок для уведомлений -->
        <div class="container">
            <div id="alert-container" class="mt-3">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade-in" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            </div>
        </div>

        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="footer mt-auto py-4">
        <div class="container text-center">
            <span class="text-white-50">
                <i class="fas fa-chart-line me-2"></i>
                Система учета движения денежных средств
            </span>
        </div>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'dds/js/main.js' %}"></script>
    <script src="{% static 'dds/js/api.js' %}"></script>
    {% block scripts %}
    {% endblock %}
</body>
</html>
